<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Clon de Google</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header>
    <nav class="izquierda"><a href="#">Sobre Google</a><a href="#">Tienda</a></nav>
    <nav class="derecha"><a href="#">Gmail</a><a href="#">Imágenes</a><button class="apps" aria-label="Aplicaciones">⠿</button><a class="sesion" href="#">Iniciar sesión</a></nav>
  </header>
  <main>
    <h1 aria-label="Google"><span class="azul">G</span><span class="rojo">o</span><span class="amarillo">o</span><span class="azul">g</span><span class="verde">l</span><span class="rojo">e</span></h1>
    <form id="formulario-busqueda">
      <div class="barra"><span class="lupa">⌕</span><input id="busqueda" aria-label="Buscar" autocomplete="off"><button id="borrar" type="button" aria-label="Borrar">×</button><span>🎙️</span></div>
      <div class="acciones"><button type="submit">Buscar con Google</button><button id="suerte" type="button">Voy a tener suerte</button></div>
    </form>
    <p>Ofrecido por Google en: <a href="#">English</a></p>
  </main>
  <footer><div class="pais">México</div><div class="enlaces"><div><a href="#">Publicidad</a><a href="#">Negocios</a><a href="#">Cómo funciona la Búsqueda</a></div><div><a href="#">Privacidad</a><a href="#">Condiciones</a><a href="#">Preferencias</a></div></div></footer>
  <script src="script.js"></script>
</body>
</html>
